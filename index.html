<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🌾 食物链实验室 · 草原版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Helvetica Neue', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1d4d2d 0%, #2a6e3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .lab-card {
            max-width: 1400px;
            width: 100%;
            background: #fef9e7;
            background-image: radial-gradient(circle at 10% 20%, #fff9e6, #f5edda);
            border-radius: 48px 48px 36px 36px;
            box-shadow: 0 30px 35px -10px rgba(0,20,5,0.6), inset 0 1px 4px rgba(255,255,240,0.8);
            padding: 24px 20px 30px 20px;
            border: 2px solid #e3d6b5;
        }
        .header {
            text-align: center;
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f4f2b, #3d6b42);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 0 #e9dbbc;
        }
        .header p {
            font-size: 1rem;
            color: #4a5b3a;
            background: #e7dbb6;
            display: inline-block;
            padding: 4px 20px;
            border-radius: 50px;
        }

        /* 栖息地标签 - 只显示草原且高亮 */
        .habitat-tabs {
            display: flex;
            justify-content: center;
            margin: 20px 0 15px;
        }
        .habitat-btn {
            background: #f5e7be;
            border: 3px solid #7f8c4a;
            font-size: 1.7rem;
            font-weight: 600;
            padding: 12px 32px;
            border-radius: 60px;
            box-shadow: 0 5px 0 #6b5e3e;
            color: #2d3e1f;
            text-align: center;
            min-width: 150px;
        }

        .library-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 15px 0 8px 15px;
            color: #2b5a1e;
        }
        .bio-grid {
            background: #dbd0ac;
            padding: 20px 16px;
            border-radius: 60px 60px 30px 30px;
            border: 3px solid #b4a177;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .bio-item {
            width: 90px;
            padding: 10px 0 6px;
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 6px 0 #a39367;
            border: 2px solid #887e5c;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            font-size: 0.9rem;
        }
        .bio-item:active { transform: scale(0.96); }
        .bio-item span { font-size: 2.2rem; display: block; margin-bottom: 4px; }
        .bio-item[data-role="producer"] { background: #c8e6c9; color: #1e4a1e; }
        .bio-item[data-role="consumer1"] { background: #fff9c4; color: #7d5d23; }
        .bio-item[data-role="consumer2"] { background: #ffd8b0; color: #8b4513; }
        .bio-item[data-role="consumer3"] { background: #ffb6b6; color: #8b1a1a; }
        .bio-item.arrow-item { background: #ffe5a3 !important; border-color: #b8860b; }

        .main-work-area {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 15px 0;
        }
        .build-area {
            flex: 1.2;
            min-width: 280px;
            background: #d6cdad;
            border-radius: 40px;
            padding: 20px;
        }
        .build-label {
            font-size: 1.5rem;
            font-weight: 600;
            color: #23502b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .build-label button {
            background: #b6aa7d;
            border: none;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .foodchain-strip {
            background: #b8ad81;
            padding: 15px;
            border-radius: 50px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            min-height: 80px;
            margin-bottom: 15px;
        }
        .placed-bio {
            border-radius: 40px;
            padding: 5px 15px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f7e9bc;
            box-shadow: 0 4px 0 #a18f5f;
            cursor: pointer;
        }
        .placed-bio span { font-size: 1.5rem; }
        .arrow-inline {
            font-size: 1.6rem;
            font-weight: 800;
            color: #745d31;
            cursor: pointer;
            background: #ecdcaa;
            padding: 0 8px;
            border-radius: 30px;
        }
        .submit-btn {
            background: #4f7a3f;
            width: 100%;
            padding: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px 0;
        }
        .result-feedback {
            background: #322f21;
            color: #f9f1c0;
            border-radius: 40px;
            padding: 10px;
            text-align: center;
        }
        .history-panel {
            flex: 0.9;
            min-width: 260px;
            background: #f1e8ca;
            border-radius: 40px;
            padding: 15px;
        }
        .history-title {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            border-bottom: 2px solid #9f9b6b;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        .history-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .history-list li {
            background: #f7e9bc;
            margin: 8px 0;
            padding: 8px 12px;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
            word-break: break-word;
        }
        .delete-record {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #8b5a2b;
        }
        .cloud-status { font-size: 0.7rem; background: #4f7a3f; color: white; padding: 2px 10px; border-radius: 20px; }
        @media (max-width: 750px) {
            .bio-item { width: 75px; font-size: 0.75rem; }
            .bio-item span { font-size: 1.8rem; }
        }
    </style>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/2.17.3/cloudbase.full.js"></script>
</head>
<body>
<div class="lab-card">
    <div class="header">
        <h1>🌾 草原食物链实验室</h1>
        <p>🔁 点击生物构建链 → 提交后自动同步</p>
    </div>

    <!-- 只有草原 -->
    <div class="habitat-tabs">
        <div class="habitat-btn">🌿 草原</div>
    </div>

    <div class="library-title">📦 生物素材库</div>
    <div class="bio-grid" id="bio-grid"></div>

    <div class="main-work-area">
        <div class="build-area">
            <div class="build-label">
                🧪 我的食物链
                <button id="clearBtn">🧹 清空</button>
            </div>
            <div class="foodchain-strip" id="foodchain-strip"></div>
            <button class="submit-btn" id="submitBtn">📤 提交同步到云端</button>
            <div class="result-feedback" id="resultMessage">✨ 构建食物链后点击提交</div>
        </div>

        <div class="history-panel">
            <div class="history-title">
                📋 我的提交记录
                <span class="cloud-status" id="cloudIndicator">☁️ 待同步</span>
            </div>
            <ul class="history-list" id="historyList"></ul>
        </div>
    </div>
</div>

<script>
    const app = cloudbase.init({ env: 'food-chain-lab-7gs8q6n82492ec18' });
    const auth = app.auth();
    const db = app.database();
    const foodChainsCollection = db.collection('foodchains');

    // 草原生物列表
    const grasslandSpecies = [
        { name: "青草", role: "producer", emoji: "🌿" },
        { name: "小树", role: "producer", emoji: "🌱" },
        { name: "蝗虫", role: "consumer1", emoji: "🦗" },
        { name: "田鼠", role: "consumer1", emoji: "🐭" },
        { name: "兔子", role: "consumer1", emoji: "🐇" },
        { name: "小鸟", role: "consumer2", emoji: "🐦" },
        { name: "蛇", role: "consumer2", emoji: "🐍" },
        { name: "羊", role: "consumer2", emoji: "🐑" },
        { name: "狼", role: "consumer3", emoji: "🐺" },
        { name: "老鹰", role: "consumer3", emoji: "🦅" }
    ];

    // 打乱数组顺序的函数
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    let chainItems = [];
    let historyRecords = [];
    let nextId = 1;

    const grid = document.getElementById('bio-grid');
    const stripDiv = document.getElementById('foodchain-strip');
    const resultMsg = document.getElementById('resultMessage');
    const clearBtn = document.getElementById('clearBtn');
    const submitBtn = document.getElementById('submitBtn');
    const historyList = document.getElementById('historyList');

    // 渲染生物库（生物打乱，箭头放最后）
    function renderBioGrid() {
        grid.innerHTML = '';
        // 复制一份并打乱顺序
        const shuffledSpecies = shuffleArray([...grasslandSpecies]);
        shuffledSpecies.forEach(bio => {
            const item = document.createElement('div');
            item.className = 'bio-item';
            item.setAttribute('data-role', bio.role);
            item.innerHTML = `<span>${bio.emoji}</span>${bio.name}`;
            item.addEventListener('click', () => {
                chainItems.push({ name: bio.name, emoji: bio.emoji, role: bio.role });
                renderStrip();
            });
            grid.appendChild(item);
        });
        // 箭头放在最后
        const arrowRight = document.createElement('div');
        arrowRight.className = 'bio-item arrow-item';
        arrowRight.innerHTML = `<span>→</span>右箭头`;
        arrowRight.addEventListener('click', () => { chainItems.push('→'); renderStrip(); });
        grid.appendChild(arrowRight);
        
        const arrowLeft = document.createElement('div');
        arrowLeft.className = 'bio-item arrow-item';
        arrowLeft.innerHTML = `<span>←</span>左箭头`;
        arrowLeft.addEventListener('click', () => { chainItems.push('←'); renderStrip(); });
        grid.appendChild(arrowLeft);
    }

    function renderStrip() {
        stripDiv.innerHTML = '';
        if (chainItems.length === 0) {
            stripDiv.innerHTML = '<div style="color:#5d6b3e;">✨ 点击生物添加，再点箭头插入</div>';
            return;
        }
        chainItems.forEach((item, idx) => {
            if (typeof item === 'string') {
                const arrowSpan = document.createElement('span');
                arrowSpan.className = 'arrow-inline';
                arrowSpan.textContent = item;
                arrowSpan.onclick = () => { chainItems.splice(idx, 1); renderStrip(); };
                stripDiv.appendChild(arrowSpan);
            } else {
                const bioDiv = document.createElement('div');
                bioDiv.className = 'placed-bio';
                bioDiv.innerHTML = `<span>${item.emoji}</span>${item.name}`;
                bioDiv.onclick = () => { chainItems.splice(idx, 1); renderStrip(); };
                stripDiv.appendChild(bioDiv);
            }
        });
    }

    function chainToString() { return chainItems.map(i => typeof i === 'string' ? i : i.emoji + i.name).join(''); }

    function updateHistoryUI() {
        historyList.innerHTML = '';
        [...historyRecords].reverse().forEach(record => {
            const li = document.createElement('li');
            li.innerHTML = `<span>${record.chainStr}</span>
                <button class="delete-record" data-id="${record.id}">✖</button>`;
            li.querySelector('.delete-record').onclick = () => {
                historyRecords = historyRecords.filter(r => r.id !== record.id);
                updateHistoryUI();
            };
            historyList.appendChild(li);
        });
        if (historyRecords.length === 0) {
            historyList.innerHTML = '<li style="justify-content:center;">📭 暂无提交记录</li>';
        }
    }

    function addHistoryRecord(chainStr) {
        historyRecords.push({ id: nextId++, chainStr: chainStr.slice(0, 50) });
        if (historyRecords.length > 30) historyRecords.shift();
        updateHistoryUI();
    }

    // 设备ID
    function getDeviceId() {
        let id = localStorage.getItem('deviceId');
        if (!id) {
            id = 'device_' + Math.random().toString(36).substr(2, 8);
            localStorage.setItem('deviceId', id);
        }
        return id;
    }

    function setCloudStatus(text, isError = false) {
        const indicator = document.getElementById('cloudIndicator');
        indicator.textContent = text;
        indicator.style.background = isError ? '#8b3a3a' : '#4f7a3f';
        setTimeout(() => indicator.textContent = '☁️ 待同步', 2000);
    }

    async function submitFoodChain() {
        const finalChain = chainToString();
        if (!finalChain) {
            resultMsg.innerText = '❓ 请先构建食物链再提交';
            return;
        }
        resultMsg.innerText = '📤 正在同步...';
        try {
            const loginState = await auth.getLoginState();
            if (!loginState) await auth.signInAnonymously();
            await foodChainsCollection.add({
                chain: finalChain,
                deviceId: getDeviceId(),
                timestamp: Date.now(),
                habitat: 'grassland'
            });
            resultMsg.innerText = '✅ 已提交！';
            addHistoryRecord(finalChain);
            setCloudStatus('已同步 ✓');
        } catch (err) {
            resultMsg.innerText = '❌ 提交失败';
            setCloudStatus('同步失败', true);
        }
    }

    clearBtn.onclick = () => { chainItems = []; renderStrip(); resultMsg.innerText = '✨ 构建食物链后点击提交'; };
    submitBtn.onclick = submitFoodChain;

    renderBioGrid();
    renderStrip();
    updateHistoryUI();
    auth.signInAnonymously().catch(console.error);
</script>
</body>
</html>
