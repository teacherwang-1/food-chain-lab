<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>教师端 - 食物链统计看板</title>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/2.17.3/cloudbase.full.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }

        /* 头部 */
        h1 {
            color: #2c3e50;
            border-left: 5px solid #27ae60;
            padding-left: 15px;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        /* 统计卡片 */
        .stats-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: space-around;
        }
        .stat-item {
            flex: 1;
            min-width: 120px;
            text-align: center;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #27ae60;
        }
        .stat-label {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* 导出按钮 */
        .export-buttons {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        .export-btn {
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            color: white;
        }
        .export-btn.word {
            background: #2c6e9e;
        }
        .export-btn.word:hover {
            background: #1e4f73;
        }
        .export-btn.pdf {
            background: #e74c3c;
        }
        .export-btn.pdf:hover {
            background: #c0392b;
        }

        /* 三个表格横排容器 */
        .habitats-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* 每个栖息地卡片 - 横排时每个占 1/3 */
        .habitat-card {
            flex: 1;
            min-width: 280px;
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        .habitat-title {
            font-size: 1.3rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 15px;
            text-align: center;
        }
        .habitat-title.forest {
            background: #2c5e2c;
            color: white;
        }
        .habitat-title.grassland {
            background: #d4a373;
            color: white;
        }
        .habitat-title.ocean {
            background: #2c6e9e;
            color: white;
        }

        .table-container {
            overflow-x: auto;
            flex: 1;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th, td {
            padding: 10px 6px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f5f5f5;
            font-weight: 600;
            border-bottom: 2px solid #ddd;
        }
        .count-badge {
            background: #e67e22;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            font-size: 0.8rem;
        }
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.2s;
        }
        .delete-btn:hover {
            background: #c0392b;
        }

        .footer-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .auto-refresh {
            font-size: 0.8rem;
            color: #27ae60;
            background: #e8f5e9;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .clear-all-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .clear-all-btn:hover {
            background: #c0392b;
        }
        .refresh-note {
            color: #7f8c8d;
            font-size: 0.8rem;
            margin-top: 15px;
            text-align: center;
        }
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #95a5a6;
        }
        .loading {
            text-align: center;
            padding: 30px;
            color: #27ae60;
        }

        @media (max-width: 900px) {
            .habitats-row {
                flex-direction: column;
            }
            .habitat-card {
                min-width: auto;
            }
            body {
                padding: 12px;
            }
            h1 {
                font-size: 1.4rem;
            }
            .stat-number {
                font-size: 1.8rem;
            }
        }

        /* 打印样式 - 打印时隐藏按钮，保留内容 */
        @media print {
            .export-buttons, .footer-bar, .refresh-note, .clear-all-btn, .delete-btn {
                display: none;
            }
            .stats-card {
                box-shadow: none;
                border: 1px solid #ddd;
            }
            .habitat-card {
                box-shadow: none;
                border: 1px solid #ddd;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <h1>🌿 食物链实验室 · 教师数据看板</h1>
    
    <div class="export-buttons">
        <button class="export-btn word" id="exportWordBtn">📄 导出 Word（三页分页）</button>
        <button class="export-btn pdf" id="exportPdfBtn">📑 导出 PDF（三页分页）</button>
    </div>
    
    <div class="stats-card">
        <div class="stat-item">
            <div class="stat-number" id="totalCount">0</div>
            <div class="stat-label">总提交次数</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="studentCount">0</div>
            <div class="stat-label">参与设备数</div>
        </div>
    </div>

    <!-- 三个表格横排 -->
    <div class="habitats-row">
        <!-- 森林 -->
        <div class="habitat-card">
            <div class="habitat-title forest">🌲 森林食物链</div>
            <div class="table-container">
                <table id="forest-table">
                    <thead>
                        <tr><th>排名</th><th>食物链</th><th>次数</th><th>操作</th> </>
                    </thead>
                    <tbody id="forest-body">
                        <tr><td colspan="4" class="loading">加载中...</td> </>
                    </tbody>
                 </table>
            </div>
        </div>

        <!-- 草原 -->
        <div class="habitat-card">
            <div class="habitat-title grassland">🌿 草原食物链</div>
            <div class="table-container">
                <table id="grassland-table">
                    <thead>
                        <tr><th>排名</th><th>食物链</th><th>次数</th><th>操作</th> </>
                    </thead>
                    <tbody id="grassland-body">
                        <tr><td colspan="4" class="loading">加载中...</td> </>
                    </tbody>
                 </table>
            </div>
        </div>

        <!-- 海洋 -->
        <div class="habitat-card">
            <div class="habitat-title ocean">🌊 海洋食物链</div>
            <div class="table-container">
                <table id="ocean-table">
                    <thead>
                        <tr><th>排名</th><th>食物链</th><th>次数</th><th>操作</th> </>
                    </thead>
                    <tbody id="ocean-body">
                        <td><td colspan="4" class="loading">加载中...</td> </>
                    </tbody>
                 </table>
            </div>
        </div>
    </div>

    <div class="footer-bar">
        <div class="auto-refresh" id="refreshTimer">🔄 实时更新中</div>
        <button class="clear-all-btn" id="clearAllBtn">清空所有数据</button>
    </div>
    <div class="refresh-note">✨ 数据每3秒自动刷新 | 点击"删除"可删除该食物链的所有记录 | 导出Word/PDF自动分三页</div>

    <script>
        const app = cloudbase.init({ env: 'food-chain-lab-7gs8q6n82492ec18' });
        const auth = app.auth();
        const db = app.database();
        const foodChainsCollection = db.collection('foodchains');

        let isLoggedIn = false;
        let isLoading = false;

        function escapeHtml(str) {
            if (!str) return '';
            // 去除emoji图标，只保留文字
            str = str.replace(/[\u{1F300}-\u{1F9FF}]/gu, '');
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 更新单个栖息地的表格
        function updateHabitatTable(habitat, data) {
            const stats = new Map();
            data.forEach(record => {
                if (record.habitat !== habitat) return;
                const chain = record.chain;
                const _id = record._id;
                if (!stats.has(chain)) {
                    stats.set(chain, { count: 0, ids: [] });
                }
                const item = stats.get(chain);
                item.count++;
                item.ids.push(_id);
            });

            const sorted = Array.from(stats.entries())
                .map(([chain, stat]) => ({ chain, count: stat.count, ids: stat.ids }))
                .sort((a, b) => b.count - a.count);

            const tbodyId = `${habitat}-body`;
            const tbody = document.getElementById(tbodyId);
            if (!tbody) return;
            
            if (sorted.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state">📭 暂无数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = '';
            sorted.forEach((item, index) => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = index + 1;
                const cleanChain = escapeHtml(item.chain);
                row.insertCell(1).innerHTML = `<strong>${cleanChain}</strong>`;
                row.insertCell(2).innerHTML = `<span class="count-badge">${item.count}</span>`;
                
                const deleteCell = row.insertCell(3);
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = '删除';
                deleteBtn.onclick = () => deleteChainRecords(habitat, item.chain, item.ids);
                deleteCell.appendChild(deleteBtn);
            });
        }

        // 删除某条食物链的所有记录
        async function deleteChainRecords(habitat, chainName, ids) {
            if (!confirm(`确定要删除「${chainName}」吗？共 ${ids.length} 条记录，不可恢复。`)) return;
            try {
                for (let id of ids) {
                    await foodChainsCollection.doc(id).remove();
                }
                alert(`✅ 已删除 ${ids.length} 条记录`);
                await updateDashboard();
            } catch (err) {
                alert('删除失败：' + err.message);
            }
        }

        async function updateDashboard() {
            if (!isLoggedIn) return;
            try {
                const res = await foodChainsCollection.get();
                const data = res.data || [];
                const totalSubmits = data.length;
                const devices = new Set(data.map(r => r.deviceId));
                document.getElementById('totalCount').innerText = totalSubmits;
                document.getElementById('studentCount').innerText = devices.size;
                
                updateHabitatTable('forest', data);
                updateHabitatTable('grassland', data);
                updateHabitatTable('ocean', data);
            } catch (err) {
                console.error('获取数据失败:', err);
            }
        }

        // 清空所有数据
        async function clearAllData() {
            if (isLoading) {
                alert('正在处理中，请稍后...');
                return;
            }
            if (!confirm('⚠️ 确定要清空所有数据吗？不可恢复！')) return;
            
            const btn = document.getElementById('clearAllBtn');
            btn.disabled = true;
            btn.textContent = '清空中...';
            isLoading = true;
            
            try {
                const res = await foodChainsCollection.get();
                const data = res.data;
                for (let item of data) {
                    await foodChainsCollection.doc(item._id).remove();
                }
                alert(`✅ 已清空 ${data.length} 条数据`);
                await updateDashboard();
            } catch (err) {
                alert('清空失败：' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '清空所有数据';
                isLoading = false;
            }
        }

        // 获取当前表格数据（用于导出）
        function getTableData(habitat) {
            const table = document.getElementById(`${habitat}-table`);
            if (!table) return [];
            const rows = [];
            const tbody = table.querySelector('tbody');
            if (!tbody) return rows;
            for (let row of tbody.rows) {
                if (row.cells.length >= 3 && !row.cells[0].innerText.includes('暂无')) {
                    rows.push({
                        rank: row.cells[0]?.innerText || '',
                        chain: row.cells[1]?.innerText || '',
                        count: row.cells[2]?.innerText || ''
                    });
                }
            }
            return rows;
        }

        // 生成三页分页HTML（用于导出）
        function generateThreePageHTML() {
            const forestData = getTableData('forest');
            const grasslandData = getTableData('grassland');
            const oceanData = getTableData('ocean');
            const now = new Date();
            const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
            const totalCount = document.getElementById('totalCount').innerText;
            const studentCount = document.getElementById('studentCount').innerText;
            
            const generatePage = (title, icon, color, data, pageNum) => {
                const titleColor = color === 'green' ? '#2c5e2c' : (color === 'orange' ? '#d4a373' : '#2c6e9e');
                return `
                <div style="page-break-after: always; page-break-inside: avoid; font-family: 'SimSun', '宋体', Arial, sans-serif; padding: 20mm;">
                    <div style="text-align: center; margin-bottom: 20mm;">
                        <div style="font-size: 48px;">${icon}</div>
                        <h1 style="color: ${titleColor}; font-size: 28px;">${title}食物链统计</h1>
                        <div style="color: #666; margin-top: 8mm;">生成时间：${dateStr}</div>
                        <div style="color: #999;">第 ${pageNum} 页</div>
                    </div>
                    <div style="margin-top: 10mm;">
                        <div style="background: ${titleColor}; color: white; padding: 8mm; text-align: center; font-size: 18px; border-radius: 8px;">
                            📊 食物链排行榜（按次数排序）
                        </div>
                        ${data.length > 0 ? `
                        <table style="width: 100%; border-collapse: collapse; margin-top: 8mm;">
                            <thead>
                                <tr style="background: ${titleColor}; color: white;">
                                    <th style="padding: 6mm; border: 1px solid #ddd;">排名</th>
                                    <th style="padding: 6mm; border: 1px solid #ddd;">食物链</th>
                                    <th style="padding: 6mm; border: 1px solid #ddd;">提交次数</th>
                                 </tr>
                            </thead>
                            <tbody>
                                ${data.map(item => `
                                <tr>
                                    <td style="padding: 5mm; border: 1px solid #ddd; text-align: center;">${item.rank}</td>
                                    <td style="padding: 5mm; border: 1px solid #ddd;">${escapeHtml(item.chain)}</td>
                                    <td style="padding: 5mm; border: 1px solid #ddd; text-align: center;">
                                        <span style="background: #e67e22; color: white; padding: 2mm 6mm; border-radius: 20px;">${item.count}</span>
                                    </td>
                                </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        ` : '<p style="text-align:center; color:#999; margin-top:15mm;">暂无提交数据</p>'}
                    </div>
                    <div style="margin-top: 15mm; text-align: center; color: #999; border-top: 1px solid #eee; padding-top: 8mm;">
                        食物链实验室 · 课堂统计报告
                    </div>
                </div>`;
            };
            
            return `<!DOCTYPE html>
            <html>
            <head><meta charset="UTF-8"><title>食物链统计报告</title>
            <style>body{margin:0;} table{width:100%;} th,td{border:1px solid #ddd;}</style>
            </head>
            <body>
                ${generatePage('森林', '🌲', 'green', forestData, 1)}
                ${generatePage('草原', '🌿', 'orange', grasslandData, 2)}
                ${generatePage('海洋', '🌊', 'blue', oceanData, 3)}
            </body>
            </html>`;
        }

        function exportToWord() {
            const blob = new Blob([generateThreePageHTML()], { type: 'application/msword' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `食物链统计_${new Date().toISOString().slice(0,10)}.doc`;
            link.click();
            URL.revokeObjectURL(link.href);
        }

        async function exportToPDF() {
            const div = document.createElement('div');
            div.style.position = 'absolute';
            div.style.left = '-9999px';
            div.style.width = '210mm';
            div.innerHTML = generateThreePageHTML();
            document.body.appendChild(div);
            try {
                await html2pdf().set({ margin: 0, filename: `食物链统计_${new Date().toISOString().slice(0,10)}.pdf` }).from(div).save();
            } finally {
                document.body.removeChild(div);
            }
        }

        document.getElementById('exportWordBtn').addEventListener('click', exportToWord);
        document.getElementById('exportPdfBtn').addEventListener('click', exportToPDF);
        document.getElementById('clearAllBtn').addEventListener('click', clearAllData);

        async function init() {
            try {
                await auth.signInAnonymously();
                isLoggedIn = true;
                document.getElementById('refreshTimer').innerHTML = '✅ 已连接';
                await updateDashboard();
                setInterval(updateDashboard, 3000);
            } catch (err) {
                document.getElementById('refreshTimer').innerHTML = '⚠️ 连接失败';
            }
        }
        init();
    </script>
</body>
</html>
