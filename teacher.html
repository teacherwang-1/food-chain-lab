<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>教师端 - 食物链统计看板</title>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/2.17.3/cloudbase.full.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: #f0f2f5;
            min-height: 100vh;
        }
        h1 { 
            color: #2c3e50; 
            border-left: 5px solid #27ae60; 
            padding-left: 15px; 
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        .stats-card { 
            background: white; 
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 20px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
            display: flex; 
            gap: 20px; 
            flex-wrap: wrap; 
            justify-content: space-around;
        }
        .stat-item { 
            flex: 1; 
            min-width: 120px; 
            text-align: center; 
            padding: 10px;
        }
        .stat-number { 
            font-size: 2.5rem; 
            font-weight: bold; 
            color: #27ae60; 
        }
        .stat-label { 
            color: #7f8c8d; 
            margin-top: 5px;
            font-size: 0.9rem;
        }
        
        .habitat-section {
            margin-bottom: 30px;
        }
        .habitat-title {
            font-size: 1.5rem;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 40px;
            margin-bottom: 15px;
            display: inline-block;
        }
        .habitat-title.forest {
            background: #2c5e2c;
            color: white;
        }
        .habitat-title.grassland {
            background: #d4a373;
            color: white;
        }
        .habitat-title.ocean {
            background: #2c6e9e;
            color: white;
        }
        
        .table-container { 
            background: white; 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
            overflow-x: auto; 
            margin-bottom: 20px;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.9rem;
        }
        th, td { 
            padding: 12px 8px; 
            text-align: left; 
            border-bottom: 1px solid #eee; 
        }
        th { 
            background: #27ae60; 
            color: white; 
            position: sticky; 
            top: 0;
            font-weight: 600;
        }
        .count-badge { 
            background: #e67e22; 
            color: white; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-weight: bold; 
            display: inline-block;
            font-size: 0.85rem;
        }
        .refresh-note { 
            color: #7f8c8d; 
            font-size: 0.8rem; 
            margin-top: 15px; 
            text-align: center; 
        }
        button { 
            background: #e74c3c; 
            color: white; 
            border: none; 
            padding: 8px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
            margin-top: 10px;
            font-size: 0.9rem;
        }
        button:hover { 
            background: #c0392b; 
        }
        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        .empty-state { 
            text-align: center; 
            padding: 40px; 
            color: #95a5a6; 
        }
        .loading { 
            text-align: center; 
            padding: 40px; 
            color: #27ae60; 
        }
        .footer-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .auto-refresh {
            font-size: 0.8rem;
            color: #27ae60;
            background: #e8f5e9;
            padding: 4px 12px;
            border-radius: 20px;
        }
        @media (max-width: 768px) {
            body { padding: 12px; }
            h1 { font-size: 1.4rem; }
            .stat-number { font-size: 1.8rem; }
            th, td { padding: 8px 4px; font-size: 0.8rem; }
            .count-badge { padding: 2px 8px; }
            .habitat-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <h1>🌿 食物链实验室 · 教师数据看板</h1>
    
    <div class="stats-card">
        <div class="stat-item">
            <div class="stat-number" id="totalCount">0</div>
            <div class="stat-label">总提交次数</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="studentCount">0</div>
            <div class="stat-label">参与设备数</div>
        </div>
    </div>

    <!-- 森林区域 -->
    <div class="habitat-section">
        <div class="habitat-title forest">🌲 森林食物链统计</div>
        <div class="table-container">
            <div style="overflow-x: auto;">
                <table id="forest-table">
                    <thead>
                        <tr><th>排名</th><th>食物链</th><th>提交次数</th><th>最近提交时间</th></tr>
                    </thead>
                    <tbody id="forest-body">
                        <tr><td colspan="4" class="loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 草原区域 -->
    <div class="habitat-section">
        <div class="habitat-title grassland">🌿 草原食物链统计</div>
        <div class="table-container">
            <div style="overflow-x: auto;">
                <table id="grassland-table">
                    <thead>
                        <tr><th>排名</th><th>食物链</th><th>提交次数</th><th>最近提交时间</th></tr>
                    </thead>
                    <tbody id="grassland-body">
                        <tr><td colspan="4" class="loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 海洋区域 -->
    <div class="habitat-section">
        <div class="habitat-title ocean">🌊 海洋食物链统计</div>
        <div class="table-container">
            <div style="overflow-x: auto;">
                <table id="ocean-table">
                    <thead>
                        <tr><th>排名</th><th>食物链</th><th>提交次数</th><th>最近提交时间</th></tr>
                    </thead>
                    <tbody id="ocean-body">
                        <tr><td colspan="4" class="loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="footer-bar">
        <div class="auto-refresh" id="refreshTimer">🔄 实时更新中</div>
        <button id="clearBtn">清空所有数据</button>
    </div>
    <div class="refresh-note">✨ 数据每3秒自动刷新，三个栖息地的食物链同时显示</div>

    <script>
        const app = cloudbase.init({ env: 'food-chain-lab-7gs8q6n82492ec18' });
        const auth = app.auth();
        const db = app.database();
        const foodChainsCollection = db.collection('foodchains');

        let isLoggedIn = false;
        let isLoading = false;

        function formatTime(timestamp) {
            if (!timestamp) return '--';
            const date = new Date(timestamp);
            return `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}:${date.getSeconds().toString().padStart(2,'0')}`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function updateHabitatTable(habitat, data) {
            const stats = new Map();
            data.forEach(record => {
                if (record.habitat !== habitat) return;
                const chain = record.chain;
                const ts = record.timestamp;
                if (!stats.has(chain)) {
                    stats.set(chain, { count: 0, latestTimestamp: ts });
                }
                const item = stats.get(chain);
                item.count++;
                if (ts > item.latestTimestamp) item.latestTimestamp = ts;
            });

            const sorted = Array.from(stats.entries())
                .map(([chain, stat]) => ({ chain, count: stat.count, latest: stat.latestTimestamp }))
                .sort((a, b) => b.count - a.count);

            const tbodyId = `${habitat}-body`;
            const tbody = document.getElementById(tbodyId);
            if (!tbody) return;
            
            if (sorted.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state">📭 暂无提交数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = '';
            sorted.forEach((item, index) => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = index + 1;
                row.insertCell(1).innerHTML = `<strong>${escapeHtml(item.chain)}</strong>`;
                row.insertCell(2).innerHTML = `<span class="count-badge">${item.count}</span>`;
                row.insertCell(3).innerText = formatTime(item.latest);
            });
        }

        async function updateDashboard() {
            if (!isLoggedIn) return;
            
            try {
                const res = await foodChainsCollection.get();
                const data = res.data || [];
                
                const totalSubmits = data.length;
                const devices = new Set(data.map(r => r.deviceId));
                document.getElementById('totalCount').innerText = totalSubmits;
                document.getElementById('studentCount').innerText = devices.size;
                
                updateHabitatTable('forest', data);
                updateHabitatTable('grassland', data);
                updateHabitatTable('ocean', data);
                
            } catch (err) {
                console.error('获取数据失败:', err);
            }
        }

        async function clearData() {
            if (isLoading) {
                alert('正在处理中，请稍后...');
                return;
            }
            
            if (!confirm('⚠️ 确定要清空所有学生提交的食物链数据吗？此操作不可恢复！')) return;
            
            const clearBtn = document.getElementById('clearBtn');
            clearBtn.disabled = true;
            clearBtn.textContent = '清空中...';
            isLoading = true;
            
            try {
                // 获取所有数据
                const res = await foodChainsCollection.get();
                const data = res.data;
                
                if (data.length === 0) {
                    alert('没有数据需要清空');
                    clearBtn.disabled = false;
                    clearBtn.textContent = '清空所有数据';
                    isLoading = false;
                    return;
                }
                
                // 逐条删除
                let deletedCount = 0;
                for (let item of data) {
                    await foodChainsCollection.doc(item._id).remove();
                    deletedCount++;
                    console.log(`已删除 ${deletedCount}/${data.length}`);
                }
                
                alert(`✅ 已清空 ${deletedCount} 条数据`);
                
                // 刷新显示
                await updateDashboard();
                
            } catch (err) {
                console.error('清空失败:', err);
                alert('清空失败：' + err.message);
            } finally {
                clearBtn.disabled = false;
                clearBtn.textContent = '清空所有数据';
                isLoading = false;
            }
        }

        document.getElementById('clearBtn').addEventListener('click', clearData);

        async function init() {
            try {
                const loginState = await auth.getLoginState();
                if (!loginState) {
                    await auth.signInAnonymously();
                    console.log('匿名登录成功');
                }
                isLoggedIn = true;
                document.getElementById('refreshTimer').innerHTML = '✅ 云端已连接 · 实时更新';
                await updateDashboard();
                setInterval(updateDashboard, 3000);
            } catch (err) {
                console.error('初始化失败:', err);
                document.getElementById('refreshTimer').innerHTML = '⚠️ 连接失败，请刷新';
            }
        }

        init();
    </script>
</body>
</html>
